<h1>Dragon Ball</h1>

<section>
  <div class="row">
    <div class="col-12 col-sm-6">
      <h3>Agregar</h3>

      <input type="text" class="form-control" placeholder="Nombre" #nameInput />
      <input type="number" class="form-control" placeholder="Poder" #powerInput />

      <button class="btn btn-primary" (click)="addCharacter(nameInput.value, powerInput.valueAsNumber)">
        Agregar
      </button>
    </div>

    <div class="row">
      <ul>
        @for (character of characters(); track character.id; let idx = $index) {
          @if (character.power >= 8000) {
            <li>
              <span>{{ idx + 1 }}. {{ character.name }}</span>
              <strong
                [class.text-danger]="character.power > 9000"
                [class.text-primary]="character.power < 9000"
                >{{ character.power }}</strong
              >
            </li>
          } @else {
            <strong>No tiene poder suficiente</strong>
          }
        }
      </ul>
    </div>
  </div>
</section>
