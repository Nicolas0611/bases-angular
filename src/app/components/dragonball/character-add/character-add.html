<div class="col-12 col-sm-6">
  <h3>Agregar</h3>

  <input
    type="text"
    class="form-control"
    placeholder="Nombre"
    [value]="name()"
    (change)="name.set(txtName.value)"
    #txtName
  />
  <input
    type="number"
    class="form-control"
    placeholder="Poder"
    [value]="power()"
    (change)="power.set(txtPower.valueAsNumber)"
    #txtPower
  />

  <button class="btn btn-primary" (click)="addCharacter()">Agregar</button>
</div>
